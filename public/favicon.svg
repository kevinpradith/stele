<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background with rounded corners (macOS icon style) -->
  <rect width="32" height="32" rx="7" fill="#0E0E0D"/>
  <!-- Stèle: a stone slab with inscription lines and a base -->
  <!-- Slab body -->
  <rect x="9" y="4" width="14" height="19" rx="2" stroke="#F6F6F4" stroke-width="1.3" fill="none"/>
  <!-- Inscription lines -->
  <line x1="12" y1="9"  x2="20" y2="9"  stroke="#F6F6F4" stroke-width="1.1" stroke-linecap="round" opacity="0.75"/>
  <line x1="12" y1="12.5" x2="20" y2="12.5" stroke="#F6F6F4" stroke-width="1.1" stroke-linecap="round" opacity="0.75"/>
  <line x1="12" y1="16" x2="17" y2="16" stroke="#F6F6F4" stroke-width="1.1" stroke-linecap="round" opacity="0.75"/>
  <!-- Pedestal / base -->
  <rect x="7" y="23" width="18" height="3" rx="1" fill="#F6F6F4" opacity="0.9"/>
  <rect x="11" y="26" width="10" height="2" rx="0.5" fill="#F6F6F4" opacity="0.6"/>
</svg>
